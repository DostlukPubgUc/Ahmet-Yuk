<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMAN PRO v16.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050505; --surf: #121214; --green: #00ffa3; --red: #ff3d71; --blue: #00e5ff; --text: #ffffff; --dim: #a1a1aa; --orange: #ffab00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; opacity: 0; animation: fadeInBody 0.8s forwards; }
        @keyframes fadeInBody { from { opacity: 0; } to { opacity: 1; } }
        
        .app { width: 100%; max-width: 450px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; animation: slideDown 0.5s ease; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .brand { font-size: 24px; font-weight: 800; color: var(--blue); letter-spacing: -0.5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        
        .card { background: var(--surf); padding: 20px; border-radius: 22px; border-left: 4px solid var(--blue); animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; position: relative; overflow: hidden; }
        .card:nth-child(2) { animation-delay: 0.1s; border-color: var(--red); }
        @keyframes cardIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .form-box { background: var(--surf); padding: 22px; border-radius: 28px; margin-bottom: 20px; animation: slideUp 0.6s 0.2s backwards; border: 1px solid rgba(255,255,255,0.03); }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        input { width: 100%; background: #1c1c1f; border: 1px solid #27272a; border-radius: 16px; padding: 16px; color: white; margin-bottom: 12px; font-size: 16px; }
        .btn { width: 100%; padding: 20px; border-radius: 18px; background: var(--blue); color: #000; font-weight: 800; border: none; cursor: pointer; font-size: 15px; }
        .btn:active { transform: scale(0.96); }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: none; padding: 20px; overflow-y: auto; animation: modalPop 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes modalPop { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .danger-mode { border: 2px solid var(--red) !important; animation: dangerGlow 1.5s infinite ease-in-out; }
        @keyframes dangerGlow { 0% { box-shadow: 0 0 5px var(--red); } 50% { box-shadow: 0 0 20px var(--red); background: #2a0a0a; } 100% { box-shadow: 0 0 5px var(--red); } }

        .item { background: var(--surf); padding: 14px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03); animation: itemSlide 0.4s backwards; cursor: pointer; }
        @keyframes itemSlide { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .mic-btn { width: 100%; padding: 14px; border-radius: 14px; background: #1c1c1f; color: var(--text); border: 1px solid #27272a; margin-bottom: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .mic-active { color: var(--red); border-color: var(--red); box-shadow: 0 0 20px rgba(255, 61, 113, 0.3); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.98); opacity: 0.6; } }
        
        .user-img { width: 55px; height: 55px; border-radius: 50%; background: #222; overflow: hidden; border: 2px solid var(--blue); flex-shrink: 0; cursor: pointer; }
        .user-img img { width: 100%; height: 100%; object-fit: cover; }
        #qrcode { background: white; padding: 12px; border-radius: 18px; display: inline-block; }
        .tool-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .tool-btn { background: #1c1c1f; border: 1px solid #27272a; color: white; padding: 12px; border-radius: 14px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="brand">AMAN PRO</div>
        <div id="clock" style="color: var(--dim); font-size: 13px; font-family: 'JetBrains Mono';">00:00:00</div>
    </div>

    <div class="grid">
        <div class="card"><span style="font-size: 12px; color: var(--dim);">TÖLEG</span><div id="t-p" style="color: var(--green); font-size: 26px; font-weight: 800;">0.00</div></div>
        <div class="card"><span style="font-size: 12px; color: var(--dim);">BERGI</span><div id="t-d" style="color: var(--red); font-size: 26px; font-weight: 800;">0.00</div></div>
    </div>

    <div class="form-box">
        <button id="mic-main" class="mic-btn" onclick="toggleMic()">🎤 Akylly Ses (Berdi/Aldy)</button>
        <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 12px;">
            <div class="user-img" onclick="document.getElementById('imgIn').click()">
                <img id="prev-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23555'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
            </div>
            <input type="text" id="name" placeholder="Müşderi ady" style="margin:0;">
        </div>
        <input type="file" id="imgIn" style="display:none" accept="image/*" onchange="previewImg(event)">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <input type="number" id="pay" placeholder="Töleg (+)">
            <input type="number" id="debt" placeholder="Bergi (-)">
        </div>
        <button class="btn" onclick="add()">HASABY TÄZELE</button>
    </div>
    <button class="btn" style="background:#1c1c1f; color:white; border:1px solid #27272a;" onclick="toggleModal('customerModal')">📋 MAGLUMATLAR</button>
</div>

<div id="customerModal" class="modal">
    <div class="header"><div class="brand">MAGLUMATLAR</div><button onclick="toggleModal('customerModal')" style="color:var(--blue); background:none; border:none; font-weight:800; cursor:pointer;">ÝAP</button></div>
    <div class="tool-bar">
        <button class="tool-btn" onclick="downloadPDF()">📄 PDF</button>
        <button class="tool-btn" onclick="exportData()">💾 BACKUP</button>
        <button class="tool-btn" onclick="document.getElementById('fIn').click()">📂 IMPORT</button>
    </div>
    <input type="file" id="fIn" style="display:none" onchange="importData(event)">
    <input type="text" id="search" placeholder="Gözle..." oninput="render()">
    <div id="list"></div>
</div>

<div id="detailsModal" class="modal"></div>

<script>
// Maglumatlar gory
let customers = JSON.parse(localStorage.getItem('aman_pro_db')) || [];
let base64Image = "";

// Canly Sagat
function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
}
setInterval(updateClock, 1000);
updateClock();

// Modallary Dolandyrmak
function toggleModal(id) {
    const modal = document.getElementById(id);
    if (modal.style.display === 'block') {
        modal.style.display = 'none';
    } else {
        modal.style.display = 'block';
    }
}

// Profil Suratyny Okatmak
function previewImg(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            base64Image = e.target.result;
            document.getElementById('prev-img').src = base64Image;
        };
        reader.readAsDataURL(file);
    }
}

// Hasap Goşmak we Täzelemek
function add() {
    const nameInput = document.getElementById('name').value.trim();
    const payInput = parseFloat(document.getElementById('pay').value) || 0;
    const debtInput = parseFloat(document.getElementById('debt').value) || 0;

    if (!nameInput) {
        alert("Müşderiniň adyny ýazyň!");
        return;
    }

    let customer = customers.find(c => c.name.toLowerCase() === nameInput.toLowerCase());

    if (customer) {
        customer.pay += payInput;
        customer.debt += debtInput;
        if (base64Image) customer.image = base64Image;
        customer.history.push({
            date: new Date().toLocaleDateString(),
            pay: payInput,
            debt: debtInput
        });
    } else {
        customers.push({
            name: nameInput,
            pay: payInput,
            debt: debtInput,
            image: base64Image || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23555'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E",
            history: [{ date: new Date().toLocaleDateString(), pay: payInput, debt: debtInput }]
        });
    }

    saveAndRefresh();
    
    // Inputlary arassalamak
    document.getElementById('name').value = "";
    document.getElementById('pay').value = "";
    document.getElementById('debt').value = "";
    document.getElementById('prev-img').src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23555'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
    base64Image = "";
}

// Jemi we Danger-Mode Hasaplaýyş
function saveAndRefresh() {
    localStorage.setItem('aman_pro_db', JSON.stringify(customers));
    
    let totalPay = 0;
    let totalDebt = 0;

    customers.forEach(c => {
        totalPay += c.pay;
        totalDebt += c.debt;
    });

    document.getElementById('t-p').innerText = totalPay.toFixed(2);
    document.getElementById('t-d').innerText = totalDebt.toFixed(2);

    const debtCard = document.getElementById('t-d').parentElement;
    if (totalDebt > totalPay) {
        debtCard.classList.add('danger-mode');
    } else {
        debtCard.classList.remove('danger-mode');
    }

    render();
}

// Sanawy Ekrana Çykarmak (Ýaşyl, Sary, Gyzyl Reňk Logikasy)
function render() {
    const list = document.getElementById('list');
    const searchVal = document.getElementById('search').value.toLowerCase();
    list.innerHTML = "";

    customers.forEach((c, index) => {
        if (c.name.toLowerCase().includes(searchVal)) {
            const netResult = c.debt - c.pay;
            let finalPriceHTML = "";
            
            if (netResult <= 0) {
                // Bergisi ýok ýa-da puly artykmaç bolsa (ÝAŞYL)
                finalPriceHTML = `<div style="font-weight:800; color:var(--green);">+${Math.abs(netResult).toFixed(2)}</div>`;
            } else if (c.pay > 0 && netResult <= (c.pay * 0.5 || 50)) { 
                // Azajyk bergi ýagdaýynda ýa-da 100 berip 101 alanda (SARY)
                finalPriceHTML = `<div style="font-weight:800; color:var(--orange); text-shadow: 0 0 10px rgba(255,171,0,0.2);">-${netResult.toFixed(2)}</div>`;
            } else {
                // Has köp bergi eden bolsa (GYZYL)
                finalPriceHTML = `<div style="font-weight:800; color:var(--red); text-shadow: 0 0 10px rgba(255,61,113,0.2);">-${netResult.toFixed(2)}</div>`;
            }

            const item = document.createElement('div');
            item.className = 'item';
            item.onclick = () => openDetails(index);
            item.innerHTML = `
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="user-img" style="width:40px; height:40px;">
                        <img src="${c.image}">
                    </div>
                    <div>
                        <div style="font-weight:600; color:white;">${c.name}</div>
                        <div style="font-size:11px; color:var(--dim);">Töleg: <span style="color:var(--green)">+${c.pay}</span> | Bergi: <span style="color:var(--red)">-${c.debt}</span></div>
                    </div>
                </div>
                ${finalPriceHTML}
            `;
            list.appendChild(item);
        }
    });
}

// Müşderi Jemi Taryhy we QR Kod
function openDetails(index) {
    const c = customers[index];
    const detailsModal = document.getElementById('detailsModal');
    
    let historyHTML = c.history.map(h => `
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #222; font-size:13px;">
            <span style="color:var(--dim);">${h.date}</span>
            <span>Töleg: <span style="color:var(--green)">+${h.pay}</span> | Bergi: <span style="color:var(--red)">-${h.debt}</span></span>
        </div>
    `).join('');

    detailsModal.innerHTML = `
        <div class="header">
            <div class="brand">${c.name}</div>
            <button onclick="toggleModal('detailsModal')" style="color:var(--blue); background:none; border:none; font-weight:800; cursor:pointer;">ÝAP</button>
        </div>
        <div style="text-align:center; margin-bottom:20px;">
            <img src="${c.image}" style="width:90px; height:90px; border-radius:50%; border:3px solid var(--blue); object-fit:cover;">
            <div style="margin-top:15px; font-size:22px; font-weight:800; color:var(--red);">Galan Bergi: ${(c.debt - c.pay > 0 ? (c.debt - c.pay).toFixed(2) : "0.00")}</div>
        </div>
        
        <h3 style="color:var(--dim); font-size:14px; margin-bottom:10px;">GÖÇÜM TARYHY</h3>
        <div style="background:var(--surf); padding:15px; border-radius:20px; max-height:200px; overflow-y:auto; margin-bottom:20px;">
            ${historyHTML}
        </div>

        <div id="qrcode-box" style="text-align:center; margin-bottom:20px;">
            <div id="qrcode" style="margin:0 auto;"></div>
        </div>

        <button class="btn" style="background:var(--red); color:#000; margin-bottom:10px;" onclick="deleteCustomer(${index})">MÜŞDERINI ÖÇÜR</button>
    `;
    
    toggleModal('detailsModal');
    
    setTimeout(() => {
        new QRCode(document.getElementById("qrcode"), {
            text: `Musderi: ${c.name}\nJemi Bergi: ${(c.debt - c.pay).toFixed(2)}`,
            width: 128,
            height: 128
        });
    }, 200);
}

function deleteCustomer(index) {
    if (confirm("Bu müşderini öçürmek isleýärsiňizmi?")) {
        customers.splice(index, 1);
        toggleModal('detailsModal');
        saveAndRefresh();
    }
}

// Akylly Ses Kontroly
let recognition;
function toggleMic() {
    const btn = document.getElementById('mic-main');
    if (btn.classList.contains('mic-active')) {
        recognition.stop();
        btn.classList.remove('mic-active');
        return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Ses goldanok.");
        return;
    }
    recognition = new SpeechRecognition();
    recognition.lang = 'tr-TR';
    btn.classList.add('mic-active');

    recognition.onresult = function(event) {
        const text = event.results[0][0].transcript.toLowerCase();
        btn.classList.remove('mic-active');
        const words = text.split(" ");
        if (words.length >= 3) {
            const name = words[0];
            const puly = parseFloat(words[1]);
            const hereket = words[2];
            if (!isNaN(puly)) {
                document.getElementById('name').value = name.toUpperCase();
                if (hereket.includes('ber') || hereket.includes('ödä')) {
                    document.getElementById('pay').value = puly;
                    document.getElementById('debt').value = "";
                } else if (hereket.includes('al') || hereket.includes('borç')) {
                    document.getElementById('debt').value = puly;
                    document.getElementById('pay').value = "";
                }
            }
        }
    };
    recognition.onerror = () => btn.classList.remove('mic-active');
    recognition.start();
}

// Eksport we Import Işleri
function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("AMAN PRO HASABAT", 14, 20);
    let y = 30;
    customers.forEach((c, idx) => {
        doc.text(`${idx + 1}. ${c.name} -> Toleg: ${c.pay} | Bergi: ${c.debt}`, 14, y);
        y += 10;
    });
    doc.save("Aman_Pro.pdf");
}

function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(customers));
    const dl = document.createElement('a');
    dl.setAttribute("href", dataStr);
    dl.setAttribute("download", "Aman_Pro_Backup.json");
    dl.click();
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        customers = JSON.parse(e.target.result);
        saveAndRefresh();
    };
    reader.readAsText(file);
}

window.onload = function() {
    saveAndRefresh();
};
</script>

</body>
</html>
