<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Ledger</title>
    <style>
        :root {
            --bg: #08080a; --surface: #121215; --accent: #00f2ff;
            --green: #00ff88; --red: #ff3366; --white: #ffffff;
        }
        body { background: var(--bg); color: var(--white); font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        
        /* Stats */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--surface); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid #222; }
        .card small { font-size: 10px; color: #888; display: block; margin-bottom: 5px; }
        
        /* Input Panel */
        .panel { background: var(--surface); padding: 20px; border-radius: 25px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #333; background: #1a1a1e; color: white; font-size: 16px; outline: none; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .main-btn { width: 100%; padding: 18px; border-radius: 15px; background: var(--white); color: #000; font-weight: bold; border: none; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        /* List */
        .list-container { margin-top: 10px; }
        .list-item { background: #161619; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); }
        .name-box { display: flex; flex-direction: column; }
        .val-box { text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <div style="font-weight: bold; font-size: 24px; color: var(--accent);">AMAN</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="stats">
        <div class="card">
            <small>JEMI TÖLEG (+)</small>
            <div id="t-pay" style="color: var(--green); font-weight: bold;">0.00</div>
        </div>
        <div class="card">
            <small>JEMI BERGI (-)</small>
            <div id="t-debt" style="color: var(--red); font-weight: bold;">0.00</div>
        </div>
    </div>

    <div class="panel">
        <input type="text" id="c-name" placeholder="Müşderiniň ady">
        <div class="row">
            <input type="number" id="c-pay" placeholder="Töleg (+)">
            <input type="number" id="c-debt" placeholder="Bergi (-)">
        </div>
        <button class="main-btn" onclick="saveData()">HASABY TÄZELE</button>
    </div>

    <div class="list-container">
        <h4 style="color: #666; font-size: 12px; margin-bottom: 15px;">MÜŞDERI SANAWY</h4>
        <div id="customer-list"></div>
    </div>
    
    <button onclick="localStorage.clear(); location.reload();" style="background: none; border: none; color: #333; font-size: 10px; margin-top: 20px; width: 100%;">Sistemany Nölle</button>
</div>

<script>
    // Maglumatlary oku
    let customers = JSON.parse(localStorage.getItem('my_ledger_v3')) || [];

    function saveData() {
        const name = document.getElementById('c-name').value.trim();
        const pay = parseFloat(document.getElementById('c-pay').value) || 0;
        const debt = parseFloat(document.getElementById('c-debt').value) || 0;

        if (!name) return alert("Adyny ýazyň!");

        let found = customers.find(c => c.name.toLowerCase() === name.toLowerCase());

        if (found) {
            found.p += pay;
            found.d -= debt; // Bergi aýrylýar
            found.t = new Date().toLocaleTimeString().slice(0, 5);
        } else {
            customers.unshift({
                name: name,
                p: pay,
                d: -debt,
                t: new Date().toLocaleTimeString().slice(0, 5)
            });
        }

        localStorage.setItem('my_ledger_v3', JSON.stringify(customers));
        
        // Arassala
        document.getElementById('c-name').value = "";
        document.getElementById('c-pay').value = "";
        document.getElementById('c-debt').value = "";
        
        render();
    }

    function render() {
        const listDiv = document.getElementById('customer-list');
        let totalP = 0;
        let totalD = 0;
        listDiv.innerHTML = "";

        customers.forEach((c, index) => {
            totalP += c.p;
            totalD += c.d;

            listDiv.innerHTML += `
                <div class="list-item" onclick="document.getElementById('c-name').value='${c.name}'">
                    <div class="name-box">
                        <span style="font-weight: bold;">${c.name}</span>
                        <span style="font-size: 10px; color: #444;">Saňat: ${c.t}</span>
                    </div>
                    <div class="val-box">
                        <div style="color: var(--green); font-size: 12px;">+${c.p.toFixed(2)}</div>
                        <div style="color: ${c.d < 0 ? 'var(--red)' : 'var(--green)'}; font-weight: bold;">
                            ${c.d.toFixed(2)} m
                        </div>
                    </div>
                </div>
            `;
        });

        document.getElementById('t-pay').innerText = totalP.toFixed(2);
        document.getElementById('t-debt').innerText = totalD.toFixed(2);
    }

    // Sagat
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Ilkinji açylyşda görkez
    render();
</script>

</body>
</html>
