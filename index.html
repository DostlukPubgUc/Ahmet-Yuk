<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMET | Business Ledger Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #08080a; --surface: #121215; --accent: #00f2ff;
            --green: #00ff88; --red: #ff3366; --text-main: #ffffff; --text-dim: #88888b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }
        
        /* Header */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .logo { width: 50px; height: 50px; background: linear-gradient(135deg, var(--accent), #4e00ff); border-radius: 14px; display: grid; place-items: center; font-weight: 800; font-size: 24px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        .live-clock { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: bold; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.03); }
        .stat-card small { color: var(--text-dim); font-size: 10px; font-weight: 700; display: block; margin-bottom: 5px; }
        .income-val { color: var(--green); font-family: 'JetBrains Mono'; }
        .debt-val { color: var(--red); font-family: 'JetBrains Mono'; }

        /* Input Section */
        .input-panel { background: var(--surface); padding: 25px; border-radius: 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-group { position: relative; margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; padding: 18px; border-radius: 15px; background: #1a1a1e; border: 1px solid #2d2d35; color: white; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        label { position: absolute; left: 15px; top: 18px; color: #555; transition: 0.2s; pointer-events: none; }
        input:focus ~ label, input:not(:placeholder-shown) ~ label { top: -10px; left: 10px; font-size: 11px; color: var(--accent); background: var(--surface); padding: 0 5px; font-weight: bold; }
        
        .save-btn { width: 100%; padding: 20px; border-radius: 15px; background: white; color: black; font-weight: 900; border: none; cursor: pointer; font-size: 14px; letter-spacing: 1px; }
        .save-btn:active { transform: scale(0.96); }

        /* List */
        .history-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .item-card { background: #161619; padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); cursor: pointer; transition: 0.2s; }
        .item-card:active { background: #1f1f23; }
        .cust-name { font-weight: 700; font-size: 16px; display: block; }
        .last-date { font-size: 10px; color: #555; margin-top: 4px; display: block; }
        .amt-debt { color: var(--red); font-weight: 800; font-size: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="main-header">
        <div class="logo">A</div>
        <div class="live-clock" id="clock">00:00:00</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <small>JEMI TÖLEG</small>
            <h2 id="total-pay" class="income-val">0.00 m</h2>
        </div>
        <div class="stat-card">
            <small>JEMI BERGI</small>
            <h2 id="total-debt" class="debt-val">0.00 m</h2>
        </div>
    </div>

    <div class="input-panel">
        <div class="form-group">
            <input type="text" id="name" placeholder=" " list="customer-data" autocomplete="off">
            <label>Müşderi gözle ýa-da goş...</label>
            <datalist id="customer-data"></datalist>
        </div>
        <div class="row">
            <div class="form-group">
                <input type="number" id="pay" placeholder=" ">
                <label>Pul berdi (-)</label>
            </div>
            <div class="form-group">
                <input type="number" id="debt" placeholder=" ">
                <label>Bergi aldy (+)</label>
            </div>
        </div>
        <button onclick="handleSave()" class="save-btn">HASABY TÄZELE</button>
    </div>

    <div class="history-title">
        <h3 style="font-size: 14px; color: var(--text-dim);">MÜŞDERI SANAWY (Basyp saýla)</h3>
        <button onclick="clearAll()" style="color:var(--red); background:none; border:none; font-size:12px;">Poz</button>
    </div>

    <div id="ledger-list" class="ledger-list"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('AHMET_SMART_DB')) || [];

    function handleSave() {
        const nameInput = document.getElementById('name');
        const payInput = document.getElementById('pay');
        const debtInput = document.getElementById('debt');

        const name = nameInput.value.trim();
        const payAmount = parseFloat(payInput.value) || 0;
        const debtAmount = parseFloat(debtAmountInput = debtInput.value) || 0;
        
        if(!name) return alert("Adyny ýazyň!");

        let index = db.findIndex(c => c.name.toLowerCase() === name.toLowerCase());
        const dateStr = new Date().toLocaleString('tk-TM', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});

        if(index !== -1) {
            // Bergiden aýyr we üstüne goş (Matematiki amallar)
            db[index].totalPay += payAmount;
            db[index].currentDebt = (db[index].currentDebt + debtAmount) - payAmount;
            db[index].date = dateStr;
            // Iň soňky täzeleneni başa geçir
            const item = db.splice(index, 1)[0];
            db.unshift(item);
        } else {
            // Täze müşderi
            db.unshift({
                name: name,
                totalPay: payAmount,
                currentDebt: debtAmount - payAmount,
                date: dateStr
            });
        }

        localStorage.setItem('AHMET_SMART_DB', JSON.stringify(db));
        render();
        nameInput.value = ""; payInput.value = ""; debtInput.value = "";
    }

    function selectCustomer(name) {
        document.getElementById('name').value = name;
        document.getElementById('pay').focus();
    }

    function render() {
        const list = document.getElementById('ledger-list');
        const datalist = document.getElementById('customer-data');
        let tP = 0; let tD = 0;
        list.innerHTML = ""; datalist.innerHTML = "";

        db.forEach(item => {
            tP += item.totalPay;
            tD += item.currentDebt;
            datalist.innerHTML += `<option value="${item.name}">`;
            list.innerHTML += `
                <div class="item-card" onclick="selectCustomer('${item.name}')">
                    <div>
                        <span class="cust-name">${item.name}</span>
                        <span class="last-date">${item.date}</span>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size:10px; color:var(--green)">Jemi tölegi: ${item.totalPay.toFixed(2)}</div>
                        <div class="amt-debt">${item.currentDebt.toFixed(2)} m</div>
                    </div>
                </div>`;
        });
        document.getElementById('total-pay').innerText = tP.toFixed(2) + " m";
        document.getElementById('total-debt').innerText = tD.toFixed(2) + " m";
    }

    function clearAll() { if(confirm("Pozmalymy?")) { db = []; localStorage.removeItem('AHMET_SMART_DB'); render(); } }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    render();
</script>
</body>
</html>
