<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMET LEDGER</title>
    <style>
        body { background: #08080a; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .box { background: #121215; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #222; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #1a1a1e; color: white; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #121215; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; background: white; color: black; font-weight: bold; border: none; font-size: 16px; }
        .item { background: #161619; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; border-left: 4px solid #00f2ff; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; margin: 10px 0 20px 0;">
        <b style="font-size: 20px; color: #00f2ff;">AMAN</b>
        <span id="clock">00:00</span>
    </div>

    <div class="grid">
        <div class="card">
            <small style="color: #888; font-size: 10px;">JEMI TÖLEG (+)</small><br>
            <b id="t-pay" style="color: #00ff88;">0.00</b>
        </div>
        <div class="card">
            <small style="color: #888; font-size: 10px;">JEMI BERGI (-)</small><br>
            <b id="t-debt" style="color: #ff3366;">0.00</b>
        </div>
    </div>

    <div class="box">
        <input type="text" id="name" placeholder="Müşderiniň ady">
        <div class="grid" style="margin-bottom: 0;">
            <input type="number" id="pay" placeholder="Töleg (+)">
            <input type="number" id="debt" placeholder="Bergi (-)">
        </div>
        <button class="btn" onclick="save()">HASABY TÄZELE</button>
    </div>

    <h4 style="color: #555; margin-left: 5px;">MÜŞDERI SANAWY</h4>
    <div id="list"></div>

    <button onclick="localStorage.clear(); location.reload();" style="color: #333; background: none; border: none; width: 100%; margin-top: 20px;">Sistemanı arassala</button>

<script>
    let data = JSON.parse(localStorage.getItem('ledger_v5')) || [];

    function save() {
        const n = document.getElementById('name').value.trim();
        const p = parseFloat(document.getElementById('pay').value) || 0;
        const d = parseFloat(document.getElementById('debt').value) || 0;

        if(!n) return alert("Ady ýazyň!");

        let user = data.find(x => x.name.toLowerCase() === n.toLowerCase());

        if(user) {
            user.p += p;
            user.d -= d;
        } else {
            data.unshift({ name: n, p: p, d: -d });
        }

        localStorage.setItem('ledger_v5', JSON.stringify(data));
        document.getElementById('name').value = "";
        document.getElementById('pay').value = "";
        document.getElementById('debt').value = "";
        render();
    }

    function render() {
        const l = document.getElementById('list');
        let tp = 0, td = 0;
        l.innerHTML = "";
        data.forEach(x => {
            tp += x.p; td += x.d;
            l.innerHTML += `
                <div class="item" onclick="document.getElementById('name').value='${x.name}'">
                    <div><b>${x.name}</b></div>
                    <div style="text-align:right">
                        <small style="color:#00ff88">+${x.p}</small><br>
                        <b style="color:${x.d < 0 ? '#ff3366' : '#00ff88'}">${x.d.toFixed(2)} m</b>
                    </div>
                </div>`;
        });
        document.getElementById('t-pay').innerText = tp.toFixed(2);
        document.getElementById('t-debt').innerText = td.toFixed(2);
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    render();
</script>
</body>
</html>
