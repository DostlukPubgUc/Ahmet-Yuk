<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMAN PRO ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #050505; --surf: #121214; --green: #00ffa3; --red: #ff3d71; --blue: #00e5ff; --text: #ffffff; --dim: #a1a1aa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; }
        .app { width: 100%; max-width: 450px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .brand { font-size: 24px; font-weight: 800; color: var(--blue); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { background: var(--surf); padding: 15px; border-radius: 20px; border-left: 3px solid var(--blue); }
        .form-box { background: var(--surf); padding: 20px; border-radius: 25px; margin-bottom: 15px; }
        input { width: 100%; background: #1c1c1f; border: 1px solid #27272a; border-radius: 14px; padding: 15px; color: white; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; background: var(--blue); color: #000; font-weight: 800; border: none; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: none; padding: 20px; overflow-y: auto; }
        .item { background: var(--surf); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .mic-btn { width: 100%; padding: 15px; border-radius: 14px; background: #1c1c1f; color: var(--text); border: 1px solid #27272a; margin-bottom: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .mic-active { border-color: var(--red); color: var(--red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tool-btn { background: #1c1c1f; border: 1px solid #27272a; color: var(--dim); padding: 8px; border-radius: 10px; font-size: 9px; font-weight: 800; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div id="lock-title" class="brand" style="margin-bottom: 20px;">AMAN PRO</div>
    <input type="password" id="pin-input" placeholder="PIN KOD" style="width: 200px; text-align: center; font-size: 20px; letter-spacing: 5px;">
    <button class="btn" onclick="handleLock()" style="width: 200px;">GIRMEK</button>
</div>

<div class="app">
    <div class="header">
        <div class="brand">AMAN PRO</div>
        <div id="clock" style="color: var(--dim); font-size: 12px;">00:00:00</div>
    </div>

    <div class="grid">
        <div class="card" style="border-color: var(--green);"><span>Töleg</span><div id="t-p" style="color: var(--green);">0.00</div></div>
        <div class="card" style="border-color: var(--red);"><span>Bergi</span><div id="t-d" style="color: var(--red);">0.00</div></div>
    </div>

    <div class="form-box">
        <button id="mic-main" class="mic-btn" onclick="toggleMic()">🎤 Sesli buýruk ber</button>
        <input type="text" id="name" placeholder="Müşderiniň ady" autocomplete="off">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="pay" placeholder="Töleg (+)">
            <input type="number" id="debt" placeholder="Bergi (-)">
        </div>
        <button class="btn" onclick="add()">HASABY TÄZELE</button>
    </div>

    <button class="btn" style="background:#1c1c1f; color:white; border:1px solid #27272a;" onclick="toggleModal('customerModal')">📋 MÜŞDERILER SANAWY</button>
</div>

<div id="customerModal" class="modal">
    <div class="header"><div class="brand">SANAW</div><button onclick="history.back()" style="color:var(--blue); background:none; border:none; font-weight:800;">ÝAP</button></div>
    
    <div class="tool-grid">
        <button class="tool-btn" onclick="downloadPDF()">📄 PDF</button>
        <button class="tool-btn" onclick="exportData()">💾 BACKUP</button>
        <button class="tool-btn" onclick="document.getElementById('fileIn').click()">📂 YZA ÝÜKLE</button>
    </div>
    <input type="file" id="fileIn" style="display:none" onchange="importData(event)">

    <input type="text" id="search" placeholder="Müşderi gözle..." oninput="render()">
    <button id="filter-btn" onclick="toggleFilter()" style="background:#222; color:var(--red); border:none; padding:10px; border-radius:12px; margin-bottom:10px; width:100%; font-weight:700;">DIŇE BERGIDARLAR</button>
    <div id="list"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('aman_v9_db')) || [];
    let savedPin = localStorage.getItem('aman_pin');
    let recognition;
    let isRecording = false;

    // PIN
    if(!savedPin) { 
        document.getElementById('lock-title').innerText = "TÄZE PAROL"; 
    }

    function handleLock() {
        const input = document.getElementById('pin-input').value;
        if(!savedPin) {
            if(input.length < 1) return;
            localStorage.setItem('aman_pin', input);
            location.reload();
        } else if(input === savedPin) {
            document.getElementById('lock-screen').style.display = 'none';
        } else { alert('Ýalňyş!'); }
    }

    // Mic Logic
    function toggleMic() {
        if (isRecording) {
            recognition.stop();
            return;
        }
        try {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'tr-TR';
            recognition.onstart = () => {
                isRecording = true;
                document.getElementById('mic-main').innerHTML = "🛑 Zapis edilýär (Aýdyň)...";
                document.getElementById('mic-main').classList.add('mic-active');
            };
            recognition.onend = () => {
                isRecording = false;
                document.getElementById('mic-main').innerHTML = "🎤 Sesli buýruk ber";
                document.getElementById('mic-main').classList.remove('mic-active');
            };
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase();
                const parts = text.split(" ");
                if(parts[0]) document.getElementById('name').value = parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
                if(parts[1]) {
                    let val = parts[1].replace(/[^0-9]/g, '');
                    document.getElementById('pay').value = val;
                }
            };
            recognition.start();
        } catch(e) { alert("Goldanmaýar"); }
    }

    window.onpopstate = () => { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); };

    function toggleModal(id) { 
        history.pushState({p:1}, "", ""); 
        document.getElementById(id).style.display = 'block'; 
        if(id === 'customerModal') render(); 
    }

    function add() {
        const nI = document.getElementById('name'), pI = document.getElementById('pay'), dI = document.getElementById('debt');
        const name = nI.value.trim(), pay = parseFloat(pI.value) || 0, debt = parseFloat(dI.value) || 0;
        if(!name) return;
        const now = new Date();
        const time = `${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()} | ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        let user = db.find(u => u.name.toLowerCase() === name.toLowerCase());
        if(user) {
            user.p += pay; user.d += debt; user.logs.unshift({t:time, p:pay, d:debt});
            db = [user, ...db.filter(u => u !== user)];
        } else {
            db.unshift({ name, p: pay, d: debt, logs: [{t:time, p:pay, d:debt}] });
        }
        localStorage.setItem('aman_v9_db', JSON.stringify(db));
        nI.value=""; pI.value=""; dI.value=""; updateStats();
    }

    function render() {
        const list = document.getElementById('list'), query = document.getElementById('search').value.toLowerCase();
        list.innerHTML = "";
        db.filter(u => u.name.toLowerCase().includes(query)).forEach(u => {
            const net = u.p - u.d;
            list.innerHTML += `<div class="item">
                <div><b>${u.name}</b></div>
                <div style="color:${net>=0?'var(--green)':'var(--red)'}; font-weight:800;">${net.toFixed(2)}</div>
            </div>`;
        });
    }

    function updateStats() {
        let tp=0, td=0; db.forEach(u => { tp+=u.p; td+=u.d; });
        document.getElementById('t-p').innerText = tp.toFixed(2);
        document.getElementById('t-d').innerText = td.toFixed(2);
    }

    function exportData() {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        a.download = "aman_pro_data.json"; a.click();
    }

    function importData(e) {
        const r = new FileReader();
        r.onload = (v) => { db = JSON.parse(v.target.result); localStorage.setItem('aman_v9_db', JSON.stringify(db)); updateStats(); alert("Ýüklendi!"); };
        r.readAsText(e.target.files[0]);
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("AMAN PRO HASABATY", 10, 10);
        db.forEach((u, i) => doc.text(`${u.name}: ${(u.p-u.d).toFixed(2)} TMT`, 10, 20 + (i*10)));
        doc.save("hasabat.pdf");
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString();
    }, 1000);
    updateStats();
</script>
</body>
</html>
