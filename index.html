<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMAN PRO FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050505; --surf: #121214; --green: #00ffa3; --red: #ff3d71; --blue: #00e5ff; --text: #ffffff; --dim: #a1a1aa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; }
        .app { width: 100%; max-width: 450px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .brand { font-size: 24px; font-weight: 800; color: var(--blue); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { background: var(--surf); padding: 15px; border-radius: 20px; border-left: 3px solid var(--blue); }
        .form-box { background: var(--surf); padding: 20px; border-radius: 25px; margin-bottom: 15px; }
        input { width: 100%; background: #1c1c1f; border: 1px solid #27272a; border-radius: 14px; padding: 15px; color: white; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; background: var(--blue); color: #000; font-weight: 800; border: none; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: none; padding: 20px; overflow-y: auto; }
        .item { background: var(--surf); padding: 12px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .mic-btn { width: 100%; padding: 12px; border-radius: 12px; background: #1c1c1f; color: var(--text); border: 1px solid #27272a; margin-bottom: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .mic-active { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .user-img { width: 45px; height: 45px; border-radius: 50%; background: #222; overflow: hidden; border: 2px solid var(--blue); }
        .user-img img { width: 100%; height: 100%; object-fit: cover; }
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #qrcode { background: white; padding: 10px; border-radius: 10px; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div id="lock-title" class="brand" style="margin-bottom: 20px;">AMAN PRO</div>
    <input type="password" id="pin-input" placeholder="PIN KOD" style="width: 200px; text-align: center; font-size: 20px;">
    <button class="btn" onclick="handleLock()" style="width: 200px;">GIRMEK</button>
</div>

<div class="app">
    <div class="header">
        <div class="brand">AMAN PRO</div>
        <div id="clock" style="color: var(--dim); font-size: 12px;">00:00:00</div>
    </div>

    <div class="grid">
        <div class="card" style="border-color: var(--green);"><span>Töleg</span><div id="t-p" style="color: var(--green);">0.00</div></div>
        <div class="card" style="border-color: var(--red);"><span>Bergi</span><div id="t-d" style="color: var(--red);">0.00</div></div>
    </div>

    <div class="form-box">
        <button id="mic-main" class="mic-btn" onclick="toggleMic()">🎤 Sesli buýruk ber</button>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
            <div class="user-img" onclick="document.getElementById('imgIn').click()">
                <img id="prev-img" src="">
            </div>
            <input type="text" id="name" placeholder="Müşderiniň ady" style="margin:0;">
        </div>
        <input type="file" id="imgIn" style="display:none" onchange="previewImg(event)">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="pay" placeholder="Töleg (+)">
            <input type="number" id="debt" placeholder="Bergi (-)">
        </div>
        <button class="btn" onclick="add()">HASABY TÄZELE</button>
    </div>

    <button class="btn" style="background:#1c1c1f; color:white;" onclick="toggleModal('customerModal')">📋 SANAW WE ARAŞŞALYK</button>
</div>

<!-- Modal Sanaw -->
<div id="customerModal" class="modal">
    <div class="header"><div class="brand">SANAW</div><button onclick="history.back()" style="color:var(--blue); background:none; border:none; font-weight:800;">ÝAP</button></div>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px;">
        <button class="btn" style="padding:10px; font-size:10px;" onclick="downloadPDF()">PDF</button>
        <button class="btn" style="padding:10px; font-size:10px;" onclick="exportData()">BACKUP</button>
        <button class="btn" style="padding:10px; font-size:10px;" onclick="document.getElementById('fIn').click()">IMPORT</button>
    </div>
    <input type="file" id="fIn" style="display:none" onchange="importData(event)">
    <input type="text" id="search" placeholder="Gözle..." oninput="render()">
    <div id="list"></div>
</div>

<!-- Modal Jikme-jiklik -->
<div id="detailsModal" class="modal">
    <div class="header"><div id="det-name" class="brand">...</div><button onclick="history.back()" style="color:var(--blue); background:none; border:none; font-weight:800;">YZA</button></div>
    <center>
        <div id="qrcode"></div>
        <p style="font-size:10px; color:var(--dim); margin-top:5px;">TÖLEG QR KODY</p>
    </center>
    <div id="det-history" style="margin-top:20px;"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('aman_v10_db')) || [];
    let savedPin = localStorage.getItem('aman_pin');
    let recognition;
    let currentImg = "";

    if(!savedPin) document.getElementById('lock-title').innerText = "TÄZE PIN";

    function handleLock() {
        const pin = document.getElementById('pin-input').value;
        if(!savedPin) { localStorage.setItem('aman_pin', pin); location.reload(); }
        else if(pin === savedPin) document.getElementById('lock-screen').style.display='none';
        else alert("Ýalňyş!");
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'tr-TR';
        window.speechSynthesis.speak(msg);
    }

    function previewImg(e) {
        const reader = new FileReader();
        reader.onload = () => { currentImg = reader.result; document.getElementById('prev-img').src = currentImg; };
        reader.readAsDataURL(e.target.files[0]);
    }

    function toggleMic() {
        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'tr-TR';
        recognition.onstart = () => { document.getElementById('mic-main').classList.add('mic-active'); document.getElementById('mic-main').innerText = "🛑 Diňleýärin..."; };
        recognition.onend = () => { document.getElementById('mic-main').classList.remove('mic-active'); document.getElementById('mic-main').innerText = "🎤 Sesli buýruk ber"; };
        recognition.onresult = (e) => {
            const res = e.results[0][0].transcript.split(" ");
            document.getElementById('name').value = res[0];
            if(res[1]) document.getElementById('pay').value = res[1].replace(/[^0-9]/g, '');
        };
        recognition.start();
    }

    function add() {
        const n = document.getElementById('name').value.trim();
        const p = parseFloat(document.getElementById('pay').value) || 0;
        const d = parseFloat(document.getElementById('debt').value) || 0;
        if(!n) return;

        let u = db.find(x => x.name.toLowerCase() === n.toLowerCase());
        const log = { t: new Date().toLocaleString(), p, d };

        if(u) {
            u.p += p; u.d += d; u.logs.unshift(log);
            if(currentImg) u.img = currentImg;
        } else {
            db.unshift({ name: n, p, d, img: currentImg, logs: [log] });
        }
        
        localStorage.setItem('aman_v10_db', JSON.stringify(db));
        speak("Boldy Aman, hasap täzelendi.");
        document.getElementById('name').value = ""; document.getElementById('pay').value = ""; document.getElementById('debt').value = "";
        document.getElementById('prev-img').src = ""; currentImg = "";
        updateStats();
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = "";
        // Arhiw logic: Bergisi 0 bolanlar aşaga geçýär
        const sorted = [...db].sort((a,b) => (a.p-a.d === 0) ? 1 : -1);
        
        sorted.forEach(u => {
            const net = u.p - u.d;
            list.innerHTML += `<div class="item" onclick="showDetails('${u.name}')">
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="user-img"><img src="${u.img || ''}"></div>
                    <b>${u.name} ${net===0 ? '(Arhiw)' : ''}</b>
                </div>
                <b style="color:${net>=0?'var(--green)':'var(--red)'}">${net.toFixed(2)}</b>
            </div>`;
        });
    }

    function showDetails(n) {
        const u = db.find(x => x.name === n);
        document.getElementById('det-name').innerText = u.name;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: `Toleg: ${u.name} - ${(u.p-u.d).toFixed(2)} TMT`, width: 128, height: 128 });
        
        let h = "";
        u.logs.forEach(l => h += `<div style="font-size:11px; border-bottom:1px solid #222; padding:5px; display:flex; justify-content:space-between;"><span>${l.t}</span><span>+${l.p} / -${l.d}</span></div>`);
        document.getElementById('det-history').innerHTML = h;
        toggleModal('detailsModal');
    }

    function toggleModal(id) { history.pushState({p:1}, "", ""); document.getElementById(id).style.display = 'block'; if(id==='customerModal') render(); }
    window.onpopstate = () => document.querySelectorAll('.modal').forEach(m => m.style.display='none');

    function updateStats() {
        let tp=0, td=0; db.forEach(u => { tp+=u.p; td+=u.d; });
        document.getElementById('t-p').innerText = tp.toFixed(2);
        document.getElementById('t-d').innerText = td.toFixed(2);
    }

    function exportData() {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        a.download = "aman_final_backup.json"; a.click();
    }

    function importData(e) {
        const r = new FileReader();
        r.onload = (v) => { db = JSON.parse(v.target.result); localStorage.setItem('aman_v10_db', JSON.stringify(db)); updateStats(); alert("OK!"); };
        r.readAsText(e.target.files[0]);
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("AMAN PRO HASABAT", 10, 10);
        db.forEach((u, i) => doc.text(`${u.name}: ${(u.p-u.d).toFixed(2)} TMT`, 10, 20+(i*10)));
        doc.save("hasabat.pdf");
    }

    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    updateStats();
</script>
</body>
</html>
