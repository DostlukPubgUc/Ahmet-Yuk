<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMAN LEDGER PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #0a84ff;
            --green: #32d74b;
            --red: #ff453a;
            --text: #ffffff;
            --text-secondary: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px;
        }

        .container { max-width: 400px; margin: 0 auto; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 0 5px; }
        .logo { font-weight: 700; font-size: 22px; letter-spacing: -0.5px; color: var(--text); }
        .time { color: var(--text-secondary); font-size: 14px; font-weight: 500; }

        /* Top Cards */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .summary-card { background: var(--card); padding: 16px; border-radius: 18px; }
        .summary-card span { color: var(--text-secondary); font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .summary-card div { font-size: 18px; font-weight: 700; margin-top: 5px; }

        /* Input Panel */
        .input-panel { background: var(--card); padding: 20px; border-radius: 24px; margin-bottom: 30px; }
        input { 
            width: 100%; 
            background: #2c2c2e; 
            border: none; 
            border-radius: 12px; 
            padding: 14px; 
            color: white; 
            font-size: 16px; 
            margin-bottom: 12px;
            font-family: inherit;
        }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-add { 
            width: 100%; 
            background: var(--text); 
            color: black; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-weight: 600; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 5px;
        }
        .btn-add:active { transform: scale(0.98); opacity: 0.9; }

        /* Customer List */
        .section-title { font-size: 13px; color: var(--text-secondary); font-weight: 600; margin-bottom: 15px; padding-left: 5px; }
        
        .customer-card { 
            background: var(--card); 
            padding: 16px; 
            border-radius: 20px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .customer-info b { font-size: 16px; display: block; margin-bottom: 2px; }
        .customer-info small { color: var(--text-secondary); font-size: 11px; }

        .balance-info { text-align: right; }
        .bal-total { font-size: 17px; font-weight: 700; }
        .bal-sub { font-size: 11px; font-weight: 500; opacity: 0.8; }

        .empty-state { text-align: center; color: var(--text-secondary); font-size: 14px; margin-top: 40px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">AMAN</div>
        <div class="time" id="clock">16:00</div>
    </header>

    <div class="summary-grid">
        <div class="summary-card">
            <span>Jemi Töleg</span>
            <div id="total-p" style="color: var(--green);">0.00</div>
        </div>
        <div class="summary-card">
            <span>Jemi Bergi</span>
            <div id="total-d" style="color: var(--red);">0.00</div>
        </div>
    </div>

    <div class="input-panel">
        <input type="text" id="name" placeholder="Müşderiniň ady" autocomplete="off">
        <div class="input-row">
            <input type="number" id="pay" placeholder="Töleg (+)">
            <input type="number" id="debt" placeholder="Bergi (-)">
        </div>
        <button class="btn-add" onclick="process()">HASABY TÄZELE</button>
    </div>

    <div class="section-title">MÜŞDERI SANAWY</div>
    <div id="list">
        <!-- Sanaw bura düşer -->
    </div>

    <button onclick="clearAll()" style="background:none; border:none; color:#2c2c2e; width:100%; margin-top:40px; font-size:11px;">Maglumatlary arassala</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('aman_pro_ledger')) || [];

    function process() {
        const n = document.getElementById('name').value.trim();
        const p = parseFloat(document.getElementById('pay').value) || 0;
        const d = parseFloat(document.getElementById('debt').value) || 0;

        if(!n) return;

        let user = db.find(u => u.name.toLowerCase() === n.toLowerCase());

        if(user) {
            user.p += p;
            user.d += d;
            // Täze amaly iň ýokary çykarmak
            db = [user, ...db.filter(u => u !== user)];
        } else {
            db.unshift({ name: n, p: p, d: d });
        }

        localStorage.setItem('aman_pro_ledger', JSON.stringify(db));
        
        document.getElementById('name').value = "";
        document.getElementById('pay').value = "";
        document.getElementById('debt').value = "";
        
        render();
    }

    function render() {
        const listDiv = document.getElementById('list');
        let sumP = 0, sumD = 0;
        
        if(db.length === 0) {
            listDiv.innerHTML = '<div class="empty-state">Heniz müşderi ýok</div>';
            document.getElementById('total-p').innerText = "0.00";
            document.getElementById('total-d').innerText = "0.00";
            return;
        }

        listDiv.innerHTML = "";
        db.forEach(u => {
            sumP += u.p;
            sumD += u.d;
            
            // Netije hasaplamasy: Töleg - Bergi
            const net = u.p - u.d;
            const netColor = net >= 0 ? 'var(--green)' : 'var(--red)';
            const netSign = net > 0 ? '+' : '';

            listDiv.innerHTML += `
                <div class="customer-card" onclick="fill('${u.name}')">
                    <div class="customer-info">
                        <b>${u.name}</b>
                        <small>Töleg: ${u.p.toFixed(2)} | Bergi: ${u.d.toFixed(2)}</small>
                    </div>
                    <div class="balance-info">
                        <div class="bal-total" style="color: ${netColor}">${netSign}${net.toFixed(2)}</div>
                        <div class="bal-sub" style="color: ${netColor}">${net >= 0 ? 'Galyndy' : 'Bergi'}</div>
                    </div>
                </div>
            `;
        });

        document.getElementById('total-p').innerText = sumP.toFixed(2);
        document.getElementById('total-d').innerText = sumD.toFixed(2);
    }

    function fill(n) { document.getElementById('name').value = n; }

    function clearAll() { 
        if(confirm("Ähli maglumatlar öçürilsinmi?")) { 
            localStorage.clear(); 
            location.reload(); 
        } 
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }

    setInterval(updateClock, 1000);
    updateClock();
    render();
</script>
</body>
</html>
