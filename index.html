<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMAN PRO v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0d; --surface: #16161a; --accent: #00f2ff;
            --green: #00ff88; --red: #ff3366; --text-main: #ffffff; --text-dim: #71717a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 5px; }
        .brand { font-weight: 800; font-size: 24px; color: var(--accent); letter-spacing: -1px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card small { color: var(--text-dim); font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .stat-card div { font-family: 'JetBrains Mono'; font-size: 19px; margin-top: 8px; }

        /* Form */
        .panel { background: var(--surface); padding: 22px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; }
        input { width: 100%; background: #202025; border: 1px solid #2d2d33; border-radius: 14px; padding: 16px; color: white; font-size: 16px; margin-bottom: 12px; outline: none; }
        input:focus { border-color: var(--accent); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .main-btn { width: 100%; padding: 18px; border-radius: 15px; background: white; color: black; font-weight: 800; border: none; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .main-btn:active { transform: scale(0.97); }

        /* List */
        .list-header { margin: 20px 0 12px 5px; font-size: 12px; color: var(--text-dim); font-weight: 800; letter-spacing: 1px; }
        .list-item { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .val-pay { color: var(--green); font-size: 11px; font-family: 'JetBrains Mono'; }
        .val-debt { font-family: 'JetBrains Mono'; font-size: 17px; font-weight: 800; margin-top: 2px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="brand">AMAN</div>
        <div id="clock" style="font-family: 'JetBrains Mono'; color: var(--text-dim); font-size: 14px;">00:00:00</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>JEMI TÖLEG (+)</small>
            <div id="t-pay" style="color: var(--green);">0.00</div>
        </div>
        <div class="stat-card">
            <small>JEMI BERGI (-)</small>
            <div id="t-debt" style="color: var(--red);">0.00</div>
        </div>
    </div>

    <div class="panel">
        <input type="text" id="c-name" placeholder="Müşderiniň ady" autocomplete="off">
        <div class="row">
            <input type="number" id="c-pay" placeholder="Töleg (+)">
            <input type="number" id="c-debt" placeholder="Bergi (-)">
        </div>
        <button class="main-btn" onclick="saveData()">Hasaby Täzele</button>
    </div>

    <div class="list-header">MÜŞDERI SANAWY</div>
    <div id="customer-list"></div>

    <button onclick="clearAll()" style="background:none; border:none; color:#333; width:100%; margin-top:30px; font-size:10px;">SISTEMANY NÖLLE</button>
</div>

<script>
    // Maglumatlar bazasy (Version 3)
    let customers = JSON.parse(localStorage.getItem('aman_v3_db')) || [];

    function saveData() {
        const nInput = document.getElementById('c-name');
        const pInput = document.getElementById('c-pay');
        const dInput = document.getElementById('c-debt');

        const name = nInput.value.trim();
        const pay = parseFloat(pInput.value) || 0;
        const debt = parseFloat(dInput.value) || 0;

        if(!name) return;

        let user = customers.find(c => c.name.toLowerCase() === name.toLowerCase());

        if(user) {
            user.tp += pay;
            user.bl -= debt; // Bergi (-) diýmek hasapdan aýyrmak
            // Iň täze amaly başa geçirmek
            customers = [user, ...customers.filter(c => c !== user)];
        } else {
            customers.unshift({ name: name, tp: pay, bl: -debt });
        }

        localStorage.setItem('aman_v3_db', JSON.stringify(customers));
        nInput.value = ""; pInput.value = ""; dInput.value = "";
        render();
    }

    function render() {
        const list = document.getElementById('customer-list');
        let totalP = 0, totalD = 0;
        list.innerHTML = "";

        customers.forEach(c => {
            totalP += c.tp;
            totalD += c.bl;
            
            list.innerHTML += `
                <div class="list-item" onclick="document.getElementById('c-name').value='${c.name}'">
                    <div>
                        <b style="display:block;">${c.name}</b>
                        <small style="color:#444; font-size:10px;">Müşderi</small>
                    </div>
                    <div style="text-align:right;">
                        <div class="val-pay">+${c.tp.toFixed(2)}</div>
                        <div class="val-debt" style="color: ${c.bl < 0 ? 'var(--red)' : 'var(--green)'}">
                            ${c.bl.toFixed(2)}
                        </div>
                    </div>
                </div>`;
        });

        document.getElementById('t-pay').innerText = totalP.toFixed(2);
        document.getElementById('t-debt').innerText = totalD.toFixed(2);
    }

    function clearAll() { if(confirm("Hemme zat öçer!")) { localStorage.clear(); location.reload(); } }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    render();
</script>
</body>
</html>
